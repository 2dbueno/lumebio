services:

  db:
    image: postgres:16-alpine
    container_name: lumebio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lumebio
      POSTGRES_USER: lumebio
      POSTGRES_PASSWORD: lumebio123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumebio"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  redis:
    image: redis:7-alpine
    container_name: lumebio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  minio:
    image: minio/minio:latest
    container_name: lumebio_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lumebio
      MINIO_ROOT_PASSWORD: lumebio123
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - appnet

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lumebio_web
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ..:/app
      - staticfiles:/app/staticfiles
      - mediafiles:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lumebio_celery_worker
    restart: unless-stopped
    env_file:
      - ../.env
    entrypoint: ["/bin/sh", "docker/scripts/celery-entrypoint.sh"]
    command: ["celery", "-A", "config.celery", "worker", "--loglevel=info"]
    volumes:
      - ..:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lumebio_celery_beat
    restart: unless-stopped
    env_file:
      - ../.env
    entrypoint: ["/bin/sh", "docker/scripts/celery-entrypoint.sh"]
    command: ["celery", "-A", "config.celery", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    volumes:
      - ..:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet

volumes:
  pgdata:
  miniodata:
  staticfiles:
  mediafiles:

networks:
  appnet:
    driver: bridge
