<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LumeBio{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <style>
        .glass {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .glow { box-shadow: 0 0 40px rgba(124,58,237,0.15); }
        body { background: #0a0a14; }
    </style>
</head>
<body class="text-white min-h-screen">

    {% if messages %}
    <div class="fixed top-4 right-4 z-50 flex flex-col gap-2">
        {% for message in messages %}
        <div class="px-4 py-3 rounded-xl text-sm font-medium shadow-lg
            {% if message.tags == 'error' %}bg-red-500/90{% elif message.tags == 'success' %}bg-green-500/90{% else %}bg-violet-600/90{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}

    <script src="{% static 'js/vendor/alpine.min.js' %}" defer></script>
    <script src="{% static 'js/vendor/htmx.min.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</body>
</html>
