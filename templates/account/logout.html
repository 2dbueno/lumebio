{% extends 'account/base_auth.html' %}

{% block title %}Sair — LumeBio{% endblock %}

{% block auth_content %}
    <div class="text-center py-4">
        <div class="w-16 h-16 rounded-2xl bg-violet-500/10 flex items-center justify-center mx-auto mb-4">
            <span class="text-3xl">👋</span>
        </div>
        <h1 class="text-xl font-bold text-white mb-2">Até logo!</h1>
        <p class="text-gray-400 text-sm mb-6">Tem certeza que quer sair?</p>

        <form method="POST" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit"
                    class="w-full py-3 bg-linear-to-r from-violet-600 to-blue-600
                           hover:from-violet-500 hover:to-blue-500 rounded-xl font-semibold transition">
                Sair
            </button>
        </form>

        <a href="/" class="block mt-4 text-sm text-gray-500 hover:text-gray-300 transition">
            Cancelar
        </a>
    </div>
{% endblock %}
