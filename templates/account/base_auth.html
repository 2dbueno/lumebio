{% extends 'base.html' %}
{% load static %}

{% block content %}
<main class="min-h-screen flex items-center justify-center px-4 py-12"
      style="background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.15) 0%, transparent 60%), #0a0a14;">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-2 group">
                <div class="w-10 h-10 rounded-xl bg-linear-to-br from-violet-500 to-blue-500 flex items-center justify-center glow">
                    <span class="text-white font-bold text-lg">L</span>
                </div>
                <span class="text-2xl font-bold bg-linear-to-r from-violet-400 to-blue-400 bg-clip-text text-transparent">
                    LumeBio
                </span>
            </a>
        </div>

        <!-- Card -->
        <div class="glass rounded-2xl p-8 glow">
            {% block auth_content %}{% endblock %}
        </div>

        <!-- Footer link -->
        <div class="text-center mt-6 text-sm text-gray-500">
            {% block auth_footer %}{% endblock %}
        </div>

    </div>
</main>
{% endblock %}
