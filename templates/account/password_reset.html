{% extends 'account/base_auth.html' %}
{% load allauth account %}

{% block title %}Recuperar senha — LumeBio{% endblock %}

{% block auth_content %}
    <h1 class="text-2xl font-bold text-white mb-1">Recuperar senha</h1>
    <p class="text-gray-400 text-sm mb-6">Enviaremos um link para o seu email</p>

    <form method="POST" action="{% url 'account_reset_password' %}" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm text-gray-400 mb-1">Email</label>
            <input type="email" name="email" required
                   placeholder="voce@email.com"
                   class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3
                          text-white placeholder-gray-600 focus:outline-none
                          focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition">
        </div>
        <button type="submit"
                class="w-full py-3 bg-linear-to-r from-violet-600 to-blue-600
                       hover:from-violet-500 hover:to-blue-500 rounded-xl font-semibold transition">
            Enviar link
        </button>
    </form>
{% endblock %}

{% block auth_footer %}
    <a href="{% url 'account_login' %}" class="text-violet-400 hover:text-violet-300 transition">
        ← Voltar ao login
    </a>
{% endblock %}
