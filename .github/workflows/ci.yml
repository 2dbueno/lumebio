name: CI

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lumebio_test
          POSTGRES_USER: lumebio
          POSTGRES_PASSWORD: lumebio123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      SECRET_KEY: ci-secret-key-nao-usar-em-producao
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SETTINGS_MODULE: config.settings.testing
      DATABASE_URL: postgresql://lumebio:lumebio123@localhost:5432/lumebio_test
      REDIS_URL: redis://localhost:6379/0
      POSTGRES_DB: lumebio_test
      POSTGRES_USER: lumebio
      POSTGRES_PASSWORD: lumebio123
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      SITE_URL: http://localhost:8000
      ABACATEPAY_API_KEY: abc_dev_ci
      ABACATEPAY_WEBHOOK_SECRET: ci-webhook-secret

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements/base.txt
            requirements/development.txt

      - name: Instalar dependências
        run: pip install -r requirements/base.txt -r requirements/development.txt

      - name: Verificar Django
        run: python manage.py check

      - name: Rodar migrations
        run: python manage.py migrate

      - name: Rodar testes
        run: python -m pytest --tb=short -q